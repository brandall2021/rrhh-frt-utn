services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: precisionhr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Puerto 5432 del host puede estar en uso; cambiar a "5432:5432" si está libre
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
